name: Continuous Deployment
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug secrets
        run: |
          echo "Username length: ${#DOCKER_USER}"
          echo "Token length: ${#DOCKER_TOKEN}"
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: aniketjha4518/vicisocket:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull image from docker hub
        run: docker pull aniketjha4518/vicisocket:latest

      - name: Stop and remove old container
        run: |
          docker stop vicisocket-container || true
          docker rm vicisocket-container || true

      - name: Run docker container
        run: |
          docker run -d \
            -p 3000:3000 \
            --name vicisocket-container \
            --restart unless-stopped \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e REDIS_URL="${{ secrets.REDIS_URL }}" \
            aniketjha4518/vicisocket:latest
